<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <title>Champion's Forge v7.0 — ETERNAL</title>
    <style>
        :root {
            --bg: #000;
            --card: #111;
            --accent: #0ff;
            --red: #f33;
            --green: #0f0;
            --blue: #0af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: #fff;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin: 20px 0;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .tab-btn {
            padding: 12px 24px;
            background: var(--card);
            border: 2px solid #333;
            border-radius: 12px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent);
        }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            margin: 16px 0;
            text-align: center;
            border: 1px solid #333;
        }

        .btn {
            padding: 16px 32px;
            margin: 8px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .smoke {
            background: #f33;
            box-shadow: 0 0 20px #f66;
        }

        .smoke.warning {
            background: #fa0;
            box-shadow: 0 0 20px #fa0;
        }

        .smoke.good {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }

        .eat {
            background: var(--blue);
        }

        .focus {
            background: var(--green);
            color: #000;
        }

        .stop {
            background: #900;
            box-shadow: 0 0 30px #f00;
            animation: pulse 1.5s infinite;
        }

        .win {
            background: #888;
        }

        .preset {
            background: #333;
            padding: 10px 18px;
            font-size: 14px;
            margin: 4px;
            border-radius: 8px;
            color: #fff;
            border: 1px solid #555;
            cursor: pointer;
            transition: 0.3s;
        }

        .preset:hover {
            background: #444;
            border-color: #777;
        }

        .timer {
            font-size: 58px;
            font-weight: bold;
            margin: 20px 0;
        }

        .big {
            font-size: 24px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card);
            padding: 32px;
            border-radius: 20px;
            width: 90%;
            max-width: 440px;
            border: 3px solid var(--accent);
            box-shadow: 0 0 40px var(--accent);
        }

        input,
        textarea {
            width: 100%;
            padding: 16px;
            background: #222;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            margin: 10px 0;
        }

        .btn-small {
            padding: 12px 24px;
            margin: 8px;
            font-size: 16px;
        }

        .cancel {
            background: #444;
        }

        .history {
            max-height: 70vh;
            overflow-y: auto;
            padding: 12px;
        }

        .entry {
            background: #222;
            padding: 16px;
            margin: 10px 0;
            border-radius: 12px;
            border-left: 5px solid var(--accent);
            position: relative;
            color: #ddd;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .entry-content {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .entry-delete {
            background: #600;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .entry-delete:hover {
            background: #f00;
            box-shadow: 0 0 10px #f00;
        }

        .entry::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
        }

        .entry b {
            color: #fff;
        }

        .entry.smoke {
            background: linear-gradient(135deg, #300 0%, #222 100%);
            border-left-color: #f33;
        }

        .entry.smoke::before {
            background: linear-gradient(180deg, #f33 0%, #900 100%);
        }

        .entry.eat {
            background: linear-gradient(135deg, #003 0%, #222 100%);
            border-left-color: #0af;
        }

        .entry.eat::before {
            background: linear-gradient(180deg, #0af 0%, #047 100%);
        }

        .entry.focus {
            background: linear-gradient(135deg, #030 0%, #222 100%);
            border-left-color: #0f0;
        }

        .entry.focus::before {
            background: linear-gradient(180deg, #0f0 0%, #070 100%);
        }

        .entry.custom {
            background: linear-gradient(135deg, #303 0%, #222 100%);
            border-left-color: #c0f;
        }

        .entry.custom::before {
            background: linear-gradient(180deg, #c0f 0%, #707 100%);
        }

        .entry.win {
            background: linear-gradient(135deg, #330 0%, #222 100%);
            border-left-color: #fa0;
        }

        .entry.win::before {
            background: linear-gradient(180deg, #fa0 0%, #a70 100%);
        }

        .entry.abort {
            border-left-color: #f00;
            background: linear-gradient(135deg, #400 0%, #200 100%);
            opacity: 0.7;
        }

        .entry.abort::before {
            background: linear-gradient(180deg, #f00 0%, #800 100%);
        }

        .entry-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
            text-transform: uppercase;
            flex-shrink: 0;
            width: auto;
        }

        .custom {
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
            margin: 15px 0;
        }

        .custom input {
            width: 80px;
            text-align: center;
            padding: 12px;
            background: #222;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
        }

        .error-banner {
            background: #600;
            color: #fff;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        /* Toggle Switch */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: 0.4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #c0f;
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        .switch-label {
            font-size: 18px;
            font-weight: bold;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <div id="errorBanner" class="error-banner"></div>

    <h1>CHAMPION'S FORGE v7.0</h1>

    <div class="tabs">
        <button class="tab-btn active" data-tab="dash" aria-label="Dashboard">DASHBOARD</button>
        <button class="tab-btn" data-tab="hist" aria-label="History">HISTORY</button>
        <button class="tab-btn" onclick="Backup.export()" aria-label="Export backup">BACKUP</button>
        <button class="tab-btn" onclick="Backup.import()" aria-label="Import backup">RESTORE</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dash" class="page" role="main">
        <div class="card">
            <h2>Smoke Slayer</h2>
            <button class="btn smoke" onclick="Actions.log('smoke')" aria-label="Log smoke">LOG SMOKE</button>
            <div id="smokeTimer" class="timer" style="color:#f66;" aria-live="polite">0h 0m</div>
        </div>

        <div class="card">
            <h2>Feast Tamer</h2>
            <button class="btn eat" onclick="Modal.open('eat')" aria-label="Log meal">LOG EAT</button>
            <div id="eatTimer" class="timer" style="color:#0ff;" aria-live="polite">0h 0m</div>
        </div>

        <div class="card">
            <h2>Procrastination Pulverizer</h2>
            <div>
                <button class="preset" onclick="Timer.set('pomo',25,5)">25/5</button>
                <button class="preset" onclick="Timer.set('pomo',50,10)">50/10</button>
                <button class="preset" onclick="Timer.set('pomo',90,20)">90/20</button>
            </div>
            <div class="custom">
                <input type="number" id="workIn" value="25" min="1" max="300" aria-label="Work minutes">
                <span class="big">/</span>
                <input type="number" id="restIn" value="5" min="1" max="60" aria-label="Rest minutes">
                <button class="preset" onclick="Timer.custom()">SET</button>
            </div>
            <button class="btn focus" onclick="Timer.start('pomo')" id="startBtn">START FOCUS</button>
            <button class="btn stop" onclick="Timer.stop('pomo')" id="stopBtn" style="display:none;">STOP
                SESSION</button>
            <div id="pomoTimer" class="timer" style="color:#0f0;" aria-live="polite">25:00</div>
            <div id="pomoStatus" class="big" aria-live="polite">Ready</div>
        </div>

        <div class="card">
            <h2>Victory Vault</h2>
            <button class="btn win" onclick="Modal.open('win')" aria-label="Log win">LOG WIN</button>
        </div>

        <div class="card">
            <h2>Custom Timer / Stopwatch</h2>

            <div class="switch-container">
                <span class="switch-label">Timer</span>
                <label class="switch">
                    <input type="checkbox" id="timerModeSwitch" onchange="Timer.toggleMode()">
                    <span class="slider"></span>
                </label>
                <span class="switch-label">Stopwatch</span>
            </div>

            <div id="timerMode">
                <div class="custom">
                    <input type="text" id="customName" placeholder="Activity name" style="width:150px;"
                        aria-label="Timer name">
                    <input type="number" id="customMin" value="10" min="1" max="999" style="width:80px;"
                        aria-label="Minutes">
                    <span class="big">min</span>
                </div>
            </div>

            <div id="stopwatchMode" style="display:none;">
                <div class="custom">
                    <input type="text" id="stopwatchName" placeholder="Activity name" style="width:200px;"
                        aria-label="Stopwatch name">
                </div>
            </div>

            <button class="btn" style="background:#c0f;" onclick="Timer.start('custom')"
                id="customStartBtn">START</button>
            <button class="btn stop" onclick="Timer.stop('custom')" id="customStopBtn" style="display:none;">STOP &
                SAVE</button>
            <div id="customTimer" class="timer" style="color:#c0f;" aria-live="polite">--:--</div>
            <div id="customStatus" class="big" aria-live="polite">Ready</div>
        </div>

        <div class="card">
            <h2>Today's Stats</h2>
            <p class="big">
                Smokes: <b id="smokeCount">0</b> |
                Eats: <b id="eatCount">0</b> |
                Completed: <b id="focusCount">0</b> |
                Hours: <b id="focusHours">0.0</b>
            </p>
        </div>
    </div>

    <!-- HISTORY -->
    <div id="hist" class="page" style="display:none;" role="region" aria-label="History">
        <div class="tabs">
            <button class="tab-btn active" data-filter="all">All</button>
            <button class="tab-btn" data-filter="smoke">Smokes</button>
            <button class="tab-btn" data-filter="eat">Eats</button>
            <button class="tab-btn" data-filter="focus">Focus</button>
            <button class="tab-btn" data-filter="custom">Custom</button>
            <button class="tab-btn" data-filter="win">Wins</button>
        </div>
        <div class="history" id="historyFeed"></div>
    </div>

    <!-- MODALS -->
    <div id="eatModal" class="modal" role="dialog" aria-labelledby="eatModalTitle">
        <div class="modal-content">
            <h2 id="eatModalTitle">What did you eat?</h2>
            <input type="text" id="eatInput" placeholder="chicken salad 30g protein" aria-label="Meal description">
            <div style="text-align:center;">
                <button class="btn eat btn-small" onclick="Actions.eat()">SAVE</button>
                <button class="btn cancel btn-small" onclick="Modal.close()">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="winModal" class="modal" role="dialog" aria-labelledby="winModalTitle">
        <div class="modal-content">
            <h2 id="winModalTitle">Log Your Win</h2>
            <textarea id="winInput" placeholder="Crushed 100 push-ups" aria-label="Win description"></textarea>
            <div style="text-align:center;">
                <button class="btn win btn-small" onclick="Actions.win()">LOG</button>
                <button class="btn cancel btn-small" onclick="Modal.close()">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        // ===== UNIFIED TIMER ENGINE (DRIFT-CORRECTED) =====
        const Timer = {
            instances: { pomo: null, custom: null },
            wakeLock: null,

            async requestWakeLock() {
                if ('wakeLock' in navigator) {
                    try {
                        this.wakeLock = await navigator.wakeLock.request('screen');
                        console.log('Wake Lock active');
                        this.wakeLock.addEventListener('release', () => {
                            console.log('Wake Lock released');
                        });
                    } catch (err) {
                        console.error('Wake Lock failed:', err);
                    }
                }
            },

            releaseWakeLock() {
                if (this.wakeLock) {
                    this.wakeLock.release();
                    this.wakeLock = null;
                }
            },

            async requestNotificationPermission() {
                if ('Notification' in window && Notification.permission === 'default') {
                    try {
                        await Notification.requestPermission();
                    } catch (err) {
                        console.warn('Notification permission denied:', err);
                        // Don't block app functionality if notifications fail
                    }
                }
            },

            notify(title, body) {
                // Vibrate first (works without permissions)
                if ('vibrate' in navigator) {
                    navigator.vibrate([200, 100, 200, 100, 200]);
                }

                // Try notification, fallback to alert
                if ('Notification' in window && Notification.permission === 'granted') {
                    try {
                        new Notification(title, {
                            body: body,
                            icon: 'images/icon-192.png',
                            badge: 'images/icon-192.png',
                            vibrate: [200, 100, 200]
                        });
                    } catch (err) {
                        console.warn('Notification failed:', err);
                        alert(`${title}\n${body}`);
                    }
                } else if ('Notification' in window && Notification.permission === 'denied') {
                    // User denied notifications - just use sound
                    console.log('Notifications blocked by user');
                } else {
                    alert(`${title}\n${body}`);
                }

                Sound.play(1200, 0.3);
            },

            set(id, w, r) {
                State.data.work = w;
                State.data.rest = r;
                if (!State.data.pomo.running) $('pomoTimer').textContent = `${w}:00`;
                State.save();
            },

            custom() {
                const w = int($('workIn').value), r = int($('restIn').value);
                if (!w || w < 1 || w > 300) return Utils.err('Work time must be 1-300 minutes');
                if (!r || r < 1 || r > 60) return Utils.err('Rest time must be 1-60 minutes');
                this.set('pomo', w, r);
            },

            toggleMode() {
                const sw = $('timerModeSwitch').checked;
                $('timerMode').style.display = sw ? 'none' : 'block';
                $('stopwatchMode').style.display = sw ? 'block' : 'none';
                $('customStartBtn').textContent = sw ? 'START STOPWATCH' : 'START TIMER';
            },

            async start(id) {
                const isPomo = id === 'pomo';
                const state = State.data[id];
                if (state.running) return;

                await this.requestWakeLock();
                await this.requestNotificationPermission();

                if (isPomo) {
                    state.running = true;
                    state.start = Date.now();
                    state.planned = State.data.work * 60;
                    state.id = Date.now();
                    state.isRest = false;

                    $('startBtn').style.display = 'none';
                    $('stopBtn').style.display = 'inline-block';
                    $('pomoStatus').textContent = 'WORK — CRUSH IT';

                    State.data.events.push({ type: 'focus', status: 'STARTED', duration: State.data.work, time: Date.now(), session: state.id });
                } else {
                    const sw = $('timerModeSwitch').checked;
                    const name = sw ? $('stopwatchName').value.trim() : $('customName').value.trim();
                    if (!name) return Utils.err('Please enter an activity name');

                    if (sw) {
                        state.running = true;
                        state.start = Date.now();
                        state.planned = 0;
                        state.name = name;
                        state.id = Date.now();
                        state.isStopwatch = true;
                        State.data.events.push({ type: 'custom', status: 'STARTED', name, time: Date.now(), session: state.id });
                    } else {
                        const min = int($('customMin').value);
                        if (!min || min < 1 || min > 999) return Utils.err('Minutes must be 1-999');
                        state.running = true;
                        state.start = Date.now();
                        state.planned = min * 60;
                        state.name = name;
                        state.id = Date.now();
                        state.isStopwatch = false;
                        State.data.events.push({ type: 'custom', status: 'STARTED', name, duration: min, time: Date.now(), session: state.id });
                    }

                    $('customStartBtn').style.display = 'none';
                    $('customStopBtn').style.display = 'inline-block';
                    $('customStatus').textContent = `${name} — Running`;
                }

                State.save();
                this.tick(id);
                // FIX #2: Use drift-correcting interval (recalculates every tick)
                this.instances[id] = setInterval(() => this.tick(id), 200); // More frequent checks
            },

            tick(id) {
                const state = State.data[id];
                // FIX #2: Always calculate from start time (no drift accumulation)
                const elapsed = Math.floor((Date.now() - state.start) / 1000);

                if (id === 'custom' && state.isStopwatch) {
                    $('customTimer').textContent = Utils.fmtSW(elapsed);
                    return;
                }

                const remaining = state.planned - elapsed;
                if (remaining <= 0) {
                    if (id === 'pomo' && !state.isRest) return this.rest();
                    return this.finish(id);
                }

                const m = pad(Math.floor(remaining / 60));
                const s = pad(remaining % 60);
                $(id === 'pomo' ? 'pomoTimer' : 'customTimer').textContent = `${m}:${s}`;
            },

            rest() {
                State.data.events.push({ type: 'focus', status: 'FINISHED', duration: State.data.work, time: Date.now(), session: State.data.pomo.id });
                State.data.pomo.start = Date.now();
                State.data.pomo.planned = State.data.rest * 60;
                State.data.pomo.isRest = true;
                $('pomoStatus').textContent = 'REST — BREATHE';
                $('pomoTimer').style.color = '#0ff';
                State.save();

                this.notify(
                    '🔥 WORK COMPLETE!',
                    `Amazing! Now rest for ${State.data.rest} minutes.`
                );
            },

            stop(id) {
                clearInterval(this.instances[id]);
                const state = State.data[id];
                const elapsedMin = Math.floor((Date.now() - state.start) / 60000);
                state.running = false;

                const anyRunning = State.data.pomo.running || State.data.custom.running;
                if (!anyRunning) {
                    this.releaseWakeLock();
                }

                if (id === 'pomo') {
                    $('startBtn').style.display = 'inline-block';
                    $('stopBtn').style.display = 'none';
                    $('pomoStatus').textContent = 'ABORTED';
                    $('pomoTimer').textContent = `${State.data.work}:00`;
                    $('pomoTimer').style.color = '#0f0';
                    if (!state.isRest) {
                        State.data.events.push({ type: 'focus', status: 'ABORTED', elapsed: elapsedMin, time: Date.now(), session: state.id });
                    }
                } else {
                    State.data.events.push({
                        type: 'custom',
                        status: state.isStopwatch ? 'FINISHED' : 'ABORTED',
                        name: state.name,
                        elapsed: elapsedMin,
                        duration: elapsedMin,
                        time: Date.now(),
                        session: state.id
                    });
                    $('customStartBtn').style.display = 'inline-block';
                    $('customStopBtn').style.display = 'none';
                    $('customStatus').textContent = state.isStopwatch ? 'Completed!' : 'Stopped';
                    $('customTimer').textContent = '--:--';

                    if (state.isStopwatch) {
                        this.notify(
                            '⏱️ Stopwatch Complete!',
                            `${state.name} finished: ${elapsedMin} minutes`
                        );
                    }
                }

                State.save();
                UI.update();
            },

            finish(id) {
                clearInterval(this.instances[id]);
                const state = State.data[id];
                state.running = false;

                const anyRunning = State.data.pomo.running || State.data.custom.running;
                if (!anyRunning) {
                    this.releaseWakeLock();
                }

                if (id === 'pomo') {
                    $('startBtn').style.display = 'inline-block';
                    $('stopBtn').style.display = 'none';
                    $('pomoStatus').textContent = 'COMPLETE — LEGEND';
                    $('pomoTimer').textContent = `${State.data.work}:00`;
                    $('pomoTimer').style.color = '#0f0';

                    this.notify(
                        '🏆 FULL SESSION COMPLETED!',
                        'You are a champion! Work + Rest done.'
                    );
                } else {
                    State.data.events.push({ type: 'custom', status: 'FINISHED', name: state.name, duration: Math.floor(state.planned / 60), time: Date.now(), session: state.id });
                    $('customStartBtn').style.display = 'inline-block';
                    $('customStopBtn').style.display = 'none';
                    $('customStatus').textContent = 'FINISHED!';
                    $('customTimer').textContent = '00:00';

                    this.notify(
                        '✅ Timer Complete!',
                        `${state.name} finished!`
                    );
                }

                State.save();
                UI.update();
            },

            async resume(id) {
                const state = State.data[id];
                await this.requestWakeLock();

                if (id === 'pomo') {
                    $('startBtn').style.display = 'none';
                    $('stopBtn').style.display = 'inline-block';
                    $('pomoStatus').textContent = state.isRest ? 'REST — RESUMED' : 'WORK — RESUMED';
                    $('pomoTimer').style.color = state.isRest ? '#0ff' : '#0f0';
                } else {
                    $('customStartBtn').style.display = 'none';
                    $('customStopBtn').style.display = 'inline-block';
                    $('customStatus').textContent = `${state.name} — Resumed`;
                    if (state.isStopwatch) {
                        $('timerModeSwitch').checked = true;
                        this.toggleMode();
                    }
                }
                this.tick(id);
                this.instances[id] = setInterval(() => this.tick(id), 200);
            }
        };

        // ===== UTILITIES =====
        const $ = id => document.getElementById(id);
        const int = v => parseInt(v);
        const pad = n => String(n).padStart(2, '0');
        const Utils = {
            fmt(ms) {
                const h = Math.floor(ms / 3600000),
                    m = Math.floor((ms % 3600000) / 60000);
                return `${h}h ${m}m`;
            },
            fmtSW(s) {
                const h = Math.floor(s / 3600),
                    m = Math.floor((s % 3600) / 60),
                    sec = s % 60;
                return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
            },
            err(msg) {
                const b = $('errorBanner');
                b.textContent = msg;
                b.style.display = 'block';
                setTimeout(() => b.style.display = 'none', 5000);
            },
            valid(d) {
                return d && typeof d === 'object' && Array.isArray(d.events) && typeof d.lastSmoke === 'number' && typeof d.lastEat === 'number';
            }
        };

        // ===== DATABASE =====
        const DB = {
            db: null,
            init() {
                return new Promise((ok, fail) => {
                    const r = indexedDB.open('EternalForge', 1);
                    r.onupgradeneeded = e => {
                        this.db = e.target.result;
                        if (!this.db.objectStoreNames.contains('state')) {
                            this.db.createObjectStore('state', { keyPath: 'id' });
                        }
                    };
                    r.onsuccess = e => { this.db = e.target.result; ok(); };
                    r.onerror = e => { console.error('DB Error:', e.target.error); Utils.err('Database failed'); fail(); };
                });
            },
            save(key, data) {
                if (!this.db) return;
                const tx = this.db.transaction('state', 'readwrite');
                tx.objectStore('state').put({ id: key, data });
                tx.onerror = () => Utils.err('Failed to save');
            },
            load(key) {
                return new Promise(ok => {
                    if (!this.db) return ok(null);
                    const r = this.db.transaction('state', 'readonly').objectStore('state').get(key);
                    r.onsuccess = () => ok(r.result?.data || null);
                    r.onerror = () => ok(null);
                });
            }
        };

        // ===== STATE =====
        const State = {
            data: {
                events: [],
                lastSmoke: 0,
                lastEat: 0,
                work: 25,
                rest: 5,
                pomo: { running: false, start: 0, planned: 0, id: null, isRest: false },
                custom: { running: false, start: 0, planned: 0, name: '', id: null, isStopwatch: false }
            },
            async load() {
                const saved = await DB.load(1);
                if (saved && Utils.valid(saved)) {
                    this.data = saved;
                    if (!this.data.pomo.hasOwnProperty('isRest')) this.data.pomo.isRest = false;
                    if (!this.data.custom) this.data.custom = { running: false, start: 0, planned: 0, name: '', id: null, isStopwatch: false };
                    if (!this.data.custom.hasOwnProperty('isStopwatch')) this.data.custom.isStopwatch = false;
                    if (this.data.pomo.running) Timer.resume('pomo');
                    if (this.data.custom.running) Timer.resume('custom');
                }
            },
            save() {
                // FIX #7: Auto-trim to last 5000 events to prevent bloat
                if (this.data.events.length > 5000) {
                    this.data.events = this.data.events.slice(-5000);
                    console.log('✂️ Trimmed history to last 5000 entries');
                }
                DB.save(1, this.data);
            }
        };

        // ===== PWA INSTALL HANDLER =====
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('✅ PWA Install prompt available!');

            // Show custom install button
            const installBtn = document.createElement('button');
            installBtn.textContent = '📱 INSTALL APP';
            installBtn.className = 'btn';
            installBtn.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#0ff; color:#000; z-index:1000; box-shadow:0 0 20px #0ff;';
            installBtn.onclick = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User ${outcome} the install`);
                deferredPrompt = null;
                installBtn.remove();
            };
            document.body.appendChild(installBtn);
        });

        window.addEventListener('appinstalled', () => {
            console.log('✅ PWA installed successfully!');
        });

        // ===== UI =====
        const UI = {
            updateTimers() {
                const now = Date.now();
                // FIX #6: Use themed placeholder instead of "Never"
                $('smokeTimer').textContent = State.data.lastSmoke === 0 ? '--:--' : Utils.fmt(now - State.data.lastSmoke);
                $('eatTimer').textContent = State.data.lastEat === 0 ? '--:--' : Utils.fmt(now - State.data.lastEat);
                if (State.data.lastSmoke > 0) Actions.updateSmoke();
            },
            updateStats() {
                const today = new Date().toDateString();
                const day = State.data.events.filter(e => new Date(e.time).toDateString() === today);
                $('smokeCount').textContent = day.filter(e => e.type === 'smoke').length;
                $('eatCount').textContent = day.filter(e => e.type === 'eat').length;
                $('focusCount').textContent = day.filter(e => e.type === 'focus' && e.status === 'FINISHED').length;
                const fh = day.filter(e => e.type === 'focus' && e.status === 'FINISHED').reduce((a, e) => a + (e.duration || 0), 0) / 60;
                const ch = day.filter(e => e.type === 'custom' && (e.status === 'FINISHED' || e.status === 'ABORTED')).reduce((a, e) => a + (e.duration || e.elapsed || 0), 0) / 60;
                $('focusHours').textContent = (fh + ch).toFixed(1);
            },
            renderHistory(filter = 'all') {
                const feed = $('historyFeed');
                feed.innerHTML = '';

                // FIX #7: Limit to last 1200 entries
                let list = filter === 'all' ? State.data.events : State.data.events.filter(e => e.type === filter);
                const total = list.length;
                list = list.slice(-1200); // Keep only last 1200

                // Show counter if entries were trimmed
                if (total > 1200) {
                    const notice = document.createElement('div');
                    notice.style.cssText = 'text-align:center; padding:16px; color:#fa0; font-weight:bold;';
                    notice.textContent = `📊 Showing last 1200 of ${total} total entries`;
                    feed.appendChild(notice);
                }

                list.sort((a, b) => b.time - a.time).forEach(e => {
                    const div = document.createElement('div');
                    div.className = `entry ${e.type}`;
                    if (e.status === 'ABORTED') div.classList.add('abort');
                    const date = new Date(e.time).toLocaleString();

                    let text = '', typeLabel = '';
                    if (e.type === 'smoke') { typeLabel = '<span class="entry-type smoke">SMOKE</span>'; text = 'Logged'; }

                    // FIX #5: CRITICAL - Use textContent to prevent XSS
                    if (e.type === 'eat') {
                        typeLabel = '<span class="entry-type eat">EAT</span>';
                        const safeNote = document.createElement('span');
                        safeNote.textContent = e.note || 'Unknown';
                        text = safeNote.outerHTML;
                    }

                    if (e.type === 'win') {
                        typeLabel = '<span class="entry-type win">WIN</span>';
                        const safeNote = document.createElement('span');
                        safeNote.textContent = e.note || 'Win';
                        text = safeNote.outerHTML;
                    }

                    if (e.type === 'focus') {
                        typeLabel = '<span class="entry-type focus">FOCUS</span>';
                        if (e.status === 'STARTED') text = `Started ${e.duration}min session`;
                        if (e.status === 'FINISHED') text = `Completed ${e.duration}min session`;
                        if (e.status === 'ABORTED') text = `Aborted after ${e.elapsed}min`;
                    }

                    if (e.type === 'custom') {
                        typeLabel = '<span class="entry-type custom">CUSTOM</span>';
                        const safeName = document.createElement('span');
                        safeName.textContent = e.name;
                        const nameHtml = safeName.outerHTML;

                        if (e.status === 'STARTED') text = `${nameHtml} — Started ${e.duration ? e.duration + 'min' : 'stopwatch'}`;
                        if (e.status === 'FINISHED') text = `${nameHtml} — ${e.duration}min`;
                        if (e.status === 'ABORTED') text = `${nameHtml} — ${e.elapsed}min`;
                    }

                    div.innerHTML = `<div class="entry-content">${typeLabel}<b>${date}</b> — ${text}</div><button class="entry-delete" onclick="Actions.deleteEvent(${e.time})">✕</button>`;
                    feed.appendChild(div);
                });
            },
            update() {
                this.updateTimers();
                this.updateStats();
                if ($('hist').style.display !== 'none') {
                    const activeFilter = document.querySelector('#hist [data-filter].active')?.dataset.filter || 'all';
                    this.renderHistory(activeFilter);
                }
            }
        };

        // ===== ACTIONS =====
        const Actions = {
            log(type) {
                const now = Date.now();
                if (type === 'smoke') { State.data.lastSmoke = now; this.updateSmoke(); }
                State.data.events.push({ type, time: now });
                State.save();
                UI.update();
            },
            updateSmoke() {
                const btn = document.querySelector('.btn.smoke');
                const hours = (Date.now() - State.data.lastSmoke) / 3600000;
                btn.classList.remove('warning', 'good');
                if (hours >= 2.5) btn.classList.add('good');
                else if (hours >= 1.5) btn.classList.add('warning');
            },
            eat() {
                const note = $('eatInput').value.trim() || 'Food';
                const now = Date.now();
                State.data.events.push({ type: 'eat', note, time: now });
                State.data.lastEat = now;
                $('eatInput').value = '';
                Modal.close();
                State.save();
                UI.update();
            },
            win() {
                const note = $('winInput').value.trim();
                if (!note) return Utils.err('Please describe your win');
                State.data.events.push({ type: 'win', note, time: Date.now() });
                $('winInput').value = '';
                Modal.close();
                State.save();
                UI.update();
            },
            deleteEvent(timestamp) {
                if (!confirm('Delete this entry? This cannot be undone.')) return;
                const idx = State.data.events.findIndex(e => e.time === timestamp);
                if (idx !== -1) {
                    const e = State.data.events[idx];
                    if (e.type === 'smoke' && e.time === State.data.lastSmoke) {
                        const prev = State.data.events.filter(ev => ev.type === 'smoke' && ev.time < timestamp).sort((a, b) => b.time - a.time)[0];
                        State.data.lastSmoke = prev ? prev.time : 0;
                    }
                    if (e.type === 'eat' && e.time === State.data.lastEat) {
                        const prev = State.data.events.filter(ev => ev.type === 'eat' && ev.time < timestamp).sort((a, b) => b.time - a.time)[0];
                        State.data.lastEat = prev ? prev.time : 0;
                    }
                    State.data.events.splice(idx, 1);
                    State.save();
                    UI.update();
                }
            }
        };

        // ===== MODAL =====
        const Modal = {
            open(id) {
                const m = $(id + 'Modal');
                m.style.display = 'flex';
                const inp = m.querySelector('input, textarea');
                if (inp) setTimeout(() => inp.focus(), 100);
            },
            close() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        };

        // ===== BACKUP =====
        const Backup = {
            export() {
                const blob = new Blob([JSON.stringify(State.data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `FORGE_${new Date().toISOString().slice(0, 10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                alert('Backup downloaded!');
            },
            import() {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = '.json';
                inp.onchange = async e => {
                    try {
                        const file = e.target.files[0];
                        if (!file) return;
                        const text = await file.text();
                        const data = JSON.parse(text);
                        if (!Utils.valid(data)) throw new Error('Invalid backup format');
                        if (State.data.pomo.running) clearInterval(Timer.instances.pomo);
                        if (State.data.custom.running) clearInterval(Timer.instances.custom);
                        State.data = data;
                        State.save();
                        UI.update();
                        alert('Backup restored successfully!');
                        location.reload();
                    } catch (err) {
                        Utils.err('Invalid backup file: ' + err.message);
                    }
                };
                inp.click();
            }
        };

        // ===== SOUND =====
        const Sound = {
            play(freq, dur) {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + dur);
                } catch (err) { console.error('Sound Error:', err); }
            }
        };

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', async () => {
            await DB.init();
            await State.load();
            UI.update();
            setInterval(() => UI.updateTimers(), 1000);
            setInterval(() => UI.updateStats(), 30000);

            document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = btn.dataset.tab;
                    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
                    if (tab) {
                        $(tab).style.display = 'block';
                        if (tab === 'hist') UI.renderHistory('all');
                    }
                };
            });

            document.querySelectorAll('#hist [data-filter]').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('#hist [data-filter]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    UI.renderHistory(btn.dataset.filter);
                };
            });

            document.addEventListener('keydown', e => { if (e.key === 'Escape') Modal.close(); });
            document.querySelectorAll('.modal').forEach(m => {
                m.addEventListener('click', e => { if (e.target === m) Modal.close(); });
            });

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(err => console.error('SW failed:', err));
            }

            // Check manifest
            fetch('manifest.json')
                .then(r => r.json())
                .then(manifest => {
                    console.log('✅ Manifest loaded:', manifest);
                    // Check icons exist
                    fetch(manifest.icons[0].src)
                        .then(r => r.ok ? console.log('✅ Icon 192 exists') : console.error('❌ Icon 192 missing'))
                        .catch(() => console.error('❌ Icon 192 missing'));
                })
                .catch(err => console.error('❌ Manifest not found:', err));
        });

        // FIX #4: Detect when tab becomes visible again
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                // Tab is now visible - force timer update
                if (State.data.pomo.running) Timer.tick('pomo');
                if (State.data.custom.running) Timer.tick('custom');
                UI.updateTimers();
                console.log('Tab visible - timers synchronized');
            }
        });


        window.addEventListener('beforeunload', () => {
            clearInterval(Timer.instances.pomo);
            clearInterval(Timer.instances.custom);
        });
    </script>
</body>
